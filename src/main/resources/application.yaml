spring:
  application:
    name: go-routex-api-gateway
  session:
    store-type: redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  cloud:
    gateway:
      server:
        webflux:
          httpclient:
            connect-timeout: 10000
            response-timeout: 60s
          forwarded:
            enabled: true
          x-forwarded:
            enabled: true
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin Vary
            - PreserveHostHeader
          globalcors:
            add-to-simple-url-handler-mapping: true
            cors-configurations:
              '[/**]':
                allowedOriginPatterns:
                  - "http://localhost:*"
                  - "http://127.0.0.1:*"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - PATCH
                  - DELETE
                  - OPTIONS
                allowedHeaders: "*"
                exposedHeaders:
                  - Authorization
                  - Content-Disposition
                  - Location
                  - X-Request-Id
                allowCredentials: true
                maxAge: 3600
          routes:
            - id: user-service
              uri: ${app.services.user-service-uri:http://localhost:8081}
              predicates:
                - Path=/api/v1/user-service/**

            - id: user-service-management
              uri: ${app.services.user-service-uri:http://localhost:8081}
              predicates:
                - Path=/api/v1/management/user-service/**

            - id: platform-core
              uri: ${app.services.platform-core-uri:http://localhost:8082}
              predicates:
                - Path=/api/v1/management/**,/api/v1/merchant-service/**,/api/v1/booking-service/**,/api/v1/payment-service/**,/api/v1/driver-service/**,/api/v1/trip-passengers/**,/api/recent-activities/**

            - id: analytics-processor
              uri: ${app.services.analytics-processor-uri:http://localhost:8083}
              predicates:
                - Path=/api/v1/analytics-service/**

            - id: notify-processor
              uri: ${app.services.notify-processor-uri:http://localhost:8085}
              predicates:
                - Path=/api/v1/notify/**

            - id: artifact-intelligence-service
              uri: ${app.services.artifact-intelligence-service-uri:http://localhost:8000}
              predicates:
                - Path=/api/v1/ai/**
server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
    gateway:
      access: unrestricted
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

info:
  app:
    name: ${spring.application.name}
    description: API gateway for Go Routex frontend traffic

app:
  security:
    cookie-domain: ${COOKIE_DOMAIN:localhost}
